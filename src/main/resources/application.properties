spring.application.name=library-management-system

spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:library_db}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true

# Access token: 15 minutes. Short-lived by design — use /api/auth/refresh to get a new one.
app.jwt.secret=${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:900000}

# Refresh token: 7 days
app.jwt.refresh-expiration-ms=${REFRESH_EXPIRATION_MS:604800000}

# Borrow period and fine
app.borrow.period-days=${BORROW_PERIOD_DAYS:14}
app.borrow.fine-per-day=${FINE_PER_DAY:5000}
